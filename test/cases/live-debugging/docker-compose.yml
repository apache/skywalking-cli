# Topology for the OAL live-debugging case: BanyanDB + OAP (admin REST on 17128) plus
# the provider/consumer demo apps. Unlike the static `admin` case, the DSL live
# debugger captures live ingest, so this case needs traffic — the consumer→provider
# calls drive Service / ServiceRelation source events through the shipped core.oal
# pipeline while the debug session is attached.
# Requires an admin-capable OAP (OAP_TAG >= 11.0.0).

version: "2.1"

services:
  banyandb:
    extends:
      file: ../../base/docker-compose.yml
      service: banyandb
  oap:
    extends:
      file: ../../base/docker-compose.yml
      service: oap
    ports:
      - 12800
      - 17128
    depends_on:
      banyandb:
        condition: service_healthy

  provider:
    extends:
      file: ../../base/docker-compose.yml
      service: provider
    depends_on:
      oap:
        condition: service_healthy

  consumer:
    extends:
      file: ../../base/docker-compose.yml
      service: consumer
    ports:
      - 9090
    depends_on:
      provider:
        condition: service_healthy

networks:
  test:
