version: "2.1"

services:
  # BanyanDB is SkyWalking's native, lightweight storage — far cheaper to spin up in
  # CI than Elasticsearch. The image tag is pinned to the same BanyanDB build the
  # upstream skywalking master e2e validates against (test/e2e-v2/script/env:
  # SW_BANYANDB_COMMIT); keep it in sync when bumping OAP_TAG.
  banyandb:
    image: ghcr.io/apache/skywalking-banyandb:84b919efca3fee3d51df9e97a734a9f10ae6f1d2
    expose:
      - 17912
      - 17913
    networks:
      - test
    command: standalone --measure-metadata-cache-wait-duration 1m --stream-metadata-cache-wait-duration 1m
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -nz 127.0.0.1 17912"]
      interval: 5s
      timeout: 60s
      retries: 120

  oap:
    image: ghcr.io/apache/skywalking/oap:${OAP_TAG}
    ports:
      - 11800
      - 12800
    networks:
      - test
    environment:
      - SW_STORAGE=banyandb
      - SW_STORAGE_BANYANDB_TARGETS=banyandb:17912
      - SW_HEALTH_CHECKER=default
      - SW_TELEMETRY=prometheus
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/12800"]
      interval: 5s
      timeout: 60s
      retries: 120
      start_period: 30s

  provider:
    image: apache/skywalking-python:0.8.0-grpc-py3.9
    environment:
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=oap:11800
      - SW_AGENT_NAME=provider
      - SW_AGENT_INSTANCE=provider1
    volumes:
      - ./services/provider.py:/app.py
    entrypoint: ["sw-python", "run", "python", "/app.py"]
    networks:
      - test
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/9091"]
      interval: 5s
      timeout: 60s
      retries: 120

  consumer:
    image: apache/skywalking-python:0.8.0-grpc-py3.9
    ports:
      - 9090
    environment:
      - SW_AGENT_COLLECTOR_BACKEND_SERVICES=oap:11800
      - SW_AGENT_NAME=consumer
      - SW_AGENT_INSTANCE=consumer1
    volumes:
      - ./services/consumer.py:/app.py
    entrypoint: ["sw-python", "run", "python", "/app.py"]
    networks:
      - test

networks:
  test:
